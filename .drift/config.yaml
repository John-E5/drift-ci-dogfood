# drift-ci dogfood — support-ticket triage.
#
# PINNED MODEL IS LOAD-BEARING. The system under test is claude-sonnet-4-6.
# Changing the model id is a deliberate re-baseline event — the nightly cron
# exists to catch the provider changing behaviour underneath this pin.
version: 1

provider:
  name: anthropic
  model: claude-sonnet-4-6

# Judge config is currently UNUSED — v1 ships only non-judge evaluators
# (exact-match / json-schema / refusal-detection). The llm-judge & rubric-
# checklist cases are parked pending upstream drift-ci judge fixes (see the
# note in suite.yaml). When they return, set a judge whose (provider, model)
# differs from the test model so self-bias stays off:
# judge:
#   provider: anthropic
#   model: claude-sonnet-4-5
#   allowSelfBias: false

storage:
  type: json-file

# Uncomment to enable dashboard sync later (no restructuring needed):
# storage:
#   type: http
#   url: https://your-dashboard.example.com
#   token: ${DRIFT_INGEST_TOKEN}

thresholds:
  regression: 0.10
  alert: 0.20

baseline:
  source: branch

concurrency: 4
timeoutMs: 60000

suite: .drift/suite.yaml
