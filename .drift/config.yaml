# drift-ci dogfood — support-ticket triage.
#
# PINNED MODEL IS LOAD-BEARING. The system under test is claude-sonnet-4-6.
# Changing the model id is a deliberate re-baseline event — the nightly cron
# exists to catch the provider changing behaviour underneath this pin.
version: 1

provider:
  name: anthropic
  model: claude-sonnet-4-6

# Judge for the llm-judge and rubric-checklist evaluators. claude-haiku-4-5 is
# a different model from the test provider (sonnet-4-6), so self-bias stays off,
# and it's the cheapest option. Requires drift-ci >= 1.1.3 — earlier versions
# couldn't parse haiku's fenced judge JSON (the bug this dogfood surfaced).
judge:
  provider: anthropic
  model: claude-haiku-4-5
  allowSelfBias: false

storage:
  type: json-file

# Uncomment to enable dashboard sync later (no restructuring needed):
# storage:
#   type: http
#   url: https://your-dashboard.example.com
#   token: ${DRIFT_INGEST_TOKEN}

thresholds:
  regression: 0.02
  alert: 0.20

baseline:
  source: branch

concurrency: 4
timeoutMs: 60000

suite: .drift/suite.yaml
