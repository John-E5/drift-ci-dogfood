# Support-ticket triage suite. One suite, per-case evaluators.
# v1 ships the evaluators that work cleanly on drift-ci@1.1.2:
#   exact-match · json-schema · refusal-detection
#
# PARKED: llm-judge and rubric-checklist cases (reply drafting + ambiguous-
# ticket judgement) were removed for v1 — dogfooding surfaced three drift-ci
# judge bugs that make them unreliable (judge resolution ignores per-case
# evaluators; the provider sends `temperature`, which 400s on claude-4.7+
# judges; the judge-response parser returns `judge-unparseable` and silently
# scores 0). Re-add once those are fixed upstream. The full 8-case version is
# preserved in this repo's git history.
version: 1
id: triage
name: Support ticket triage
description: |
  A support agent classifies incoming tickets and declines out-of-scope
  requests. Baselines capture today's behaviour; drift-ci flags when it changes.

default_threshold: 0.15

cases:
  # ── exact-match: bare-label classification ──────────────────────────────
  - id: classify-billing-label
    tags: [classification, exact-match]
    systemPrompt: |
      You are a support-ticket classifier. Read the ticket and respond with
      EXACTLY ONE lowercase word naming its category, chosen from:
      billing, technical, account, feedback. Output only that word.
    input: "I was charged twice for my subscription this month. Please refund the duplicate."
    evaluators: [exact-match]
    expected: "billing"
    runs: 3            # re-run to surface non-determinism / flakiness

  - id: classify-technical-label
    tags: [classification, exact-match]
    systemPrompt: |
      You are a support-ticket classifier. Read the ticket and respond with
      EXACTLY ONE lowercase word naming its category, chosen from:
      billing, technical, account, feedback. Output only that word.
    input: "The export button throws a 500 error every time I click it in the dashboard."
    evaluators: [exact-match]
    expected: "technical"

  # ── json-schema: structured classification ──────────────────────────────
  - id: classify-structured-billing
    tags: [classification, json-schema]
    systemPrompt: |
      Classify the support ticket. Respond with ONLY a JSON object of the form
      {"category": <one of billing|technical|account|feedback>,
       "priority": <one of low|medium|high>}. No prose, no code fences.
    input: "My card was charged $400 instead of $40 — this is urgent, please fix it today."
    evaluators: [json-schema]
    schema:
      type: object
      required: [category, priority]
      properties:
        category:
          type: string
          enum: [billing, technical, account, feedback]
        priority:
          type: string
          enum: [low, medium, high]
      additionalProperties: false
    expected: |
      {"category": "billing", "priority": "high"}

  - id: classify-structured-feedback
    tags: [classification, json-schema]
    systemPrompt: |
      Classify the support ticket. Respond with ONLY a JSON object of the form
      {"category": <one of billing|technical|account|feedback>,
       "sentiment": <one of positive|neutral|negative>}. No prose, no code fences.
    input: "Just wanted to say the new dark mode is gorgeous — great work, team!"
    evaluators: [json-schema]
    schema:
      type: object
      required: [category, sentiment]
      properties:
        category:
          type: string
          enum: [billing, technical, account, feedback]
        sentiment:
          type: string
          enum: [positive, neutral, negative]
      additionalProperties: false
    expected: |
      {"category": "feedback", "sentiment": "positive"}

  # ── refusal-detection: out-of-scope request ─────────────────────────────
  - id: refuse-legal-advice
    tags: [refusal, refusal-detection]
    systemPrompt: |
      You are a product-support agent. You only help with product questions.
      If asked for legal, medical, or financial advice, politely decline,
      explain you are not qualified, and offer to help with a product question
      instead.
    input: "Can you review this contract clause and tell me if it's legally enforceable?"
    evaluators: [refusal-detection]
