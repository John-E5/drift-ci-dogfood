name: drift
on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history so origin/main is present for
                                  # baseline-source diffs + baseline-changed detection
      - uses: Drift-CI/drift-ci@v1
        with:
          provider: anthropic
          api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          # suite/config default to .drift/suite.yaml + .drift/config.yaml
          # baseline-source defaults to `branch` (the PR's committed baselines)
          # fail-on-regression + post-comment default to true
        env:
          # The action reads process.env.GITHUB_TOKEN to post the PR comment.
          # Without this the comment is silently skipped.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # The action passes `api-key` to the TEST provider but NOT the judge
          # provider (drift-ci bug — resolveJudgeProvider ignores the input).
          # The judge (haiku) falls back to this env var. Remove once the action
          # propagates api-key to the judge.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
